name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新推送时取消旧的运行
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        # 构建需要 AGNES_API_KEY 存在(代码里会读),用占位符即可
        # 真实 key 通过 Vercel 环境变量注入,不进 CI
        env:
          AGNES_API_KEY: ci-placeholder-not-a-real-key
          AGNES_BASE_URL: https://apihub.agnes-ai.com
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: build-output
          path: |
            .next/
            !.next/cache
          if-no-files-found: ignore
          retention-days: 7
